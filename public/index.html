<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SuperChef — AI Recipe Finder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --card:#161616;
  --card2:#1c1c1c;
  --border:#242424;
  --lime:#c8ff00;
  --lime-dim:rgba(200,255,0,0.12);
  --lime-glow:rgba(200,255,0,0.25);
  --lime-dark:#9dc400;
  --text:#f5f5f5;
  --muted:#606060;
  --muted2:#404040;
  --red:#ff3b3b;
  --amber:#ffbe00;
  --radius:14px;
  --radius-sm:10px;
}

html,body{height:100%;overflow:hidden}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:38px;height:38px;border-radius:11px;background:var(--lime);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.logo-mark::before{content:'';position:absolute;inset:3px;border-radius:50%;border:3px solid #0a0a0a;}
.logo-mark::after{content:'✓';color:#0a0a0a;font-size:13px;font-weight:900;position:relative;z-index:1;}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;line-height:1;}
.logo-name span{color:var(--lime)}
.logo-sub{font-size:0.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.ai-pill{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:999px;padding:5px 13px;font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 8px var(--lime)}
.btn-pro{background:linear-gradient(135deg,#c8ff00,#80ff80);border:none;border-radius:999px;padding:6px 14px;font-size:0.72rem;font-weight:700;color:#0a0a0a;cursor:pointer;letter-spacing:0.5px;font-family:'Space Grotesk',sans-serif;transition:all 0.15s;}
.btn-pro:hover{transform:translateY(-1px);box-shadow:0 0 20px var(--lime-glow);}
.search-counter{font-size:0.7rem;font-weight:600;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:5px 12px;}
.search-counter.warn{color:var(--amber);border-color:rgba(255,190,0,0.4);}
.search-counter.empty{color:var(--red);border-color:rgba(255,59,59,0.4);}
.app{display:grid;grid-template-columns:360px 1fr;flex:1;min-height:0;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{flex:1;padding:12px 8px;text-align:center;font-size:0.72rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-family:'Space Grotesk',sans-serif;}
.stab.on{color:var(--lime);border-bottom-color:var(--lime);}
.stab:hover:not(.on){color:var(--text);}
.tab-panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
.tab-panel.on{display:flex;}
.s-block{padding:18px 18px;border-bottom:1px solid var(--border);}
.s-block:last-child{border-bottom:none;flex:1;}
.s-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.s-label-count{width:20px;height:20px;border-radius:50%;background:var(--lime);color:#0a0a0a;font-size:0.63rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.input-wrap{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:border-color 0.2s;}
.input-wrap:focus-within{border-color:var(--lime)}
.ing-in{flex:1;background:none;border:none;padding:11px 13px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:0.86rem;outline:none;}
.ing-in::placeholder{color:var(--muted2)}
.btn-add{background:var(--lime);border:none;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:1.3rem;color:#0a0a0a;font-weight:900;transition:background 0.15s;}
.btn-add:hover{background:var(--lime-dark)}
.ing-limit-note{margin-top:8px;font-size:0.7rem;color:var(--muted);display:flex;align-items:center;gap:5px;}
.ing-limit-note.warn{color:var(--amber)}
.ing-limit-note.full{color:var(--red)}
.chips{display:flex;flex-wrap:wrap;gap:6px;overflow-y:auto;max-height:120px;padding-bottom:2px;}
.chip{display:flex;align-items:center;gap:5px;background:var(--lime-dim);border:1px solid rgba(200,255,0,0.25);border-radius:999px;padding:4px 7px 4px 11px;font-size:0.77rem;font-weight:500;color:var(--text);animation:chipPop 0.18s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes chipPop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.chip-rm{background:var(--muted2);border:none;width:17px;height:17px;border-radius:50%;color:#0a0a0a;font-size:0.65rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
.chip-rm:hover{background:var(--red)}
.btn-find{width:100%;background:var(--lime);border:none;border-radius:var(--radius-sm);padding:14px;color:#0a0a0a;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.92rem;cursor:pointer;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.15s;text-transform:uppercase;}
.btn-find:hover:not(:disabled){background:#d8ff1a;box-shadow:0 0 28px var(--lime-glow);transform:translateY(-1px);}
.btn-find:disabled{opacity:0.22;cursor:not-allowed;transform:none;box-shadow:none}
.limit-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,190,0,0.08);border:1px solid rgba(255,190,0,0.25);border-radius:10px;padding:10px 14px;font-size:0.75rem;color:var(--amber);margin:12px 16px 0;line-height:1.5;}
.limit-banner button{background:var(--amber);border:none;border-radius:6px;padding:5px 12px;font-size:0.7rem;font-weight:700;color:#0a0a0a;cursor:pointer;font-family:'Space Grotesk',sans-serif;white-space:nowrap;}.browser-panel{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.browser-search-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.browser-search{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:border-color 0.2s;}
.browser-search:focus-within{border-color:var(--lime)}
.browser-search-icon{padding:0 12px;color:var(--muted);font-size:0.95rem;}
.browser-search-in{flex:1;background:none;border:none;padding:10px 0;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:0.84rem;outline:none;}
.browser-search-in::placeholder{color:var(--muted2)}
.browser-search-clear{background:none;border:none;cursor:pointer;color:var(--muted);padding:0 12px;font-size:1rem;transition:color 0.15s;display:none;}
.browser-search-clear:hover{color:var(--text)}
.browser-search-clear.vis{display:flex;align-items:center;}
.browser-scroll{flex:1;overflow-y:auto;padding-bottom:20px;}
.browser-scroll::-webkit-scrollbar{width:3px}
.browser-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cat-block{border-bottom:1px solid var(--border);}
.cat-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background 0.15s;user-select:none;}
.cat-header:hover{background:var(--card)}
.cat-emoji{font-size:1.4rem;flex-shrink:0;width:32px;text-align:center;}
.cat-info{flex:1;min-width:0;}
.cat-name{font-weight:700;font-size:0.88rem;}
.cat-sub{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.cat-arrow{color:var(--muted);font-size:0.75rem;transition:transform 0.2s;flex-shrink:0;}
.cat-block.open .cat-arrow{transform:rotate(180deg);}
.cat-pills{padding:0 16px 14px;display:none;flex-wrap:wrap;gap:7px;}
.cat-block.open .cat-pills{display:flex;}
.ipill{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:0.75rem;font-weight:500;color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.15s;user-select:none;}
.ipill:hover:not(.added):not(.disabled-pill){background:var(--lime-dim);border-color:rgba(200,255,0,0.35);color:var(--lime);}
.ipill.added{background:var(--lime-dim);border-color:rgba(200,255,0,0.4);color:var(--lime);cursor:default;}
.ipill.added::before{content:'✓ ';font-weight:700;}
.ipill.disabled-pill{opacity:0.3;cursor:not-allowed;}
.search-results-label{padding:10px 16px 4px;font-size:0.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.search-no-results{padding:30px 16px;text-align:center;color:var(--muted);font-size:0.84rem;}
.main{display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;background:var(--bg);}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 24px;text-align:center;}
.empty-icon{width:96px;height:96px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative;background:var(--surface);}
.empty-icon::before{content:'';position:absolute;inset:-1px;border-radius:50%;border:2px solid transparent;border-top-color:var(--lime);animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;color:var(--text);}
.empty p{color:var(--muted);font-size:0.84rem;max-width:320px;line-height:1.7}
.empty-hints{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.hint{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:0.73rem;color:var(--muted);}
.hint-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--lime);}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
.load-ring{width:70px;height:70px;position:relative;}
.load-ring::before,.load-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;}
.load-ring::before{border-top-color:var(--lime);animation:spin 0.9s linear infinite}
.load-ring::after{border-bottom-color:rgba(200,255,0,0.3);animation:spin 1.4s linear infinite reverse;inset:8px}
.load-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.load-text{text-align:center}
.load-text strong{display:block;font-size:1rem;margin-bottom:4px}
.load-text span{font-size:0.8rem;color:var(--muted)}
.results-inner{padding:22px 22px 48px;display:flex;flex-direction:column;gap:20px}
.res-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;line-height:1.1;}
.res-title .hl{color:var(--lime)}
.res-sub{font-size:0.77rem;color:var(--muted);margin-top:4px;line-height:1.5}
.res-sub b{color:var(--text)}
.filter-row{display:flex;gap:7px;flex-wrap:wrap}
.f-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:0.71rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;letter-spacing:0.3px;transition:all 0.15s;text-transform:uppercase;}
.f-btn:hover,.f-btn.on{background:var(--lime-dim);border-color:rgba(200,255,0,0.35);color:var(--lime);}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;flex:1;min-width:90px;}
.stat-icon{font-size:1.2rem}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--lime);line-height:1}
.stat-lbl{font-size:0.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.filter-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center;}
.filter-empty-icon{font-size:2.5rem;opacity:0.4}
.filter-empty-msg{font-size:0.84rem;color:var(--muted);line-height:1.6}
.filter-empty-msg strong{display:block;color:var(--text);font-size:0.88rem;margin-bottom:4px}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.1,0.64,1);position:relative;outline:none;}
.rcard:focus-visible{border-color:var(--lime);box-shadow:0 0 0 3px var(--lime-glow);}
.rcard:hover{border-color:var(--lime);transform:translateY(-4px);box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(200,255,0,0.15);}
.thumb{position:relative;aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;}
.thumb-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);opacity:0;transition:opacity 0.2s;}
.rcard:hover .thumb-overlay,.rcard:focus-visible .thumb-overlay{opacity:1}
.play-btn{width:50px;height:50px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;color:#0a0a0a;font-size:1.2rem;box-shadow:0 0 30px var(--lime-glow);transform:scale(0.85);transition:transform 0.2s;}
.rcard:hover .play-btn,.rcard:focus-visible .play-btn{transform:scale(1)}
.thumb-badges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;}
.badge{font-size:0.62rem;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:0.5px;text-transform:uppercase;display:inline-flex;align-items:center;}
.b-match{background:var(--lime);color:#0a0a0a}
.b-easy{background:rgba(200,255,0,0.12);border:1px solid rgba(200,255,0,0.3);color:var(--lime)}
.b-medium{background:rgba(255,190,0,0.12);border:1px solid rgba(255,190,0,0.3);color:#ffbe00}
.b-hard{background:rgba(255,59,59,0.12);border:1px solid rgba(255,59,59,0.3);color:var(--red)}
.cbody{padding:13px 14px 15px;display:flex;flex-direction:column;gap:10px;flex:1}
.cname{font-weight:700;font-size:0.93rem;line-height:1.3}
.cmeta{display:flex;gap:12px;flex-wrap:wrap}
.cmeta-i{display:flex;align-items:center;gap:5px;font-size:0.71rem;color:var(--muted)}
.mbar-row{display:flex;align-items:center;gap:10px}
.mbar-bg{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.mbar-fg{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--lime),#80ff80);transition:width 0.7s ease;}
.mbar-pct{font-size:0.69rem;font-weight:700;color:var(--lime);white-space:nowrap;min-width:32px;text-align:right}
.ing-pills{display:flex;flex-wrap:wrap;gap:5px}
.ip{font-size:0.65rem;font-weight:500;padding:2px 7px;border-radius:5px;}
.ip-have{background:rgba(200,255,0,0.1);border:1px solid rgba(200,255,0,0.2);color:var(--lime)}
.ip-need{background:rgba(255,190,0,0.08);border:1px solid rgba(255,190,0,0.2);color:#ffbe00}
.btn-watch{margin-top:auto;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.78rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.18s;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;}
.btn-watch:hover{background:var(--lime);color:#0a0a0a;border-color:var(--lime);box-shadow:0 0 20px var(--lime-glow);}
.yt-logo{width:20px;height:14px;background:#ff0000;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:0.55rem;color:#fff;flex-shrink:0;font-weight:900;}
.err{background:rgba(255,59,59,0.06);border:1px solid rgba(255,59,59,0.2);border-radius:var(--radius);padding:20px;display:flex;gap:14px;}
.err-icon{font-size:1.6rem;flex-shrink:0}
.err-msg strong{display:block;margin-bottom:4px}
.err-msg p{font-size:0.81rem;color:var(--muted)}
.btn-retry{margin-top:12px;background:var(--lime);border:none;border-radius:8px;padding:8px 16px;color:#0a0a0a;font-weight:700;font-size:0.78rem;cursor:pointer;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:0.5px;}
.btn-retry:hover{background:#d8ff1a}
.video-pending{display:inline-flex;align-items:center;gap:7px;margin-top:10px;font-size:0.71rem;font-weight:600;color:var(--lime);background:var(--lime-dim);border:1px solid rgba(200,255,0,0.25);border-radius:999px;padding:5px 12px;}
.video-pending .dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.ad-banner{margin-top:4px;border-top:1px solid var(--border);padding-top:16px;}
.ad-label{font-size:0.58rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted2);margin-bottom:8px;}
.ad-placeholder{border-radius:var(--radius-sm);overflow:hidden;}
.ad-mock{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:0.8rem;color:var(--muted);}
.btn-go-pro-small{background:var(--lime);border:none;border-radius:8px;padding:7px 14px;font-size:0.73rem;font-weight:700;color:#0a0a0a;cursor:pointer;font-family:'Space Grotesk',sans-serif;white-space:nowrap;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 32px;max-width:400px;width:100%;position:relative;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.modal-close{position:absolute;top:14px;right:14px;background:var(--card2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;color:var(--muted);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--text)}
.modal-icon{font-size:2.5rem;margin-bottom:10px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;margin-bottom:8px;}
.modal-title span{color:var(--lime)}
.modal-sub{font-size:0.84rem;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.modal-perks{list-style:none;text-align:left;display:flex;flex-direction:column;gap:8px;margin-bottom:22px;background:var(--card);border-radius:var(--radius-sm);padding:16px 18px;}
.modal-perks li{font-size:0.83rem;color:var(--text);}
.modal-price{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--lime);letter-spacing:1px;margin-bottom:16px;}
.modal-price span{font-size:1rem;color:var(--muted);font-family:'Space Grotesk',sans-serif;letter-spacing:0;}
.btn-upgrade{display:block;background:var(--lime);border-radius:var(--radius-sm);padding:15px;color:#0a0a0a;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;text-decoration:none;transition:all 0.15s;letter-spacing:0.5px;text-transform:uppercase;}
.btn-upgrade:hover{background:#d8ff1a;box-shadow:0 0 30px var(--lime-glow);transform:translateY(-1px);}
.modal-note{font-size:0.7rem;color:var(--muted2);margin-top:12px;}
@media(max-width:820px){ht<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <div>
      <div class="logo-name">Super<span>Chef</span></div>
      <div class="logo-sub">AI Recipe Finder</div>

// ═══════════════════════════════════════════════
//  FREEMIUM — search counter (localStorage)
// ═══════════════════════════════════════════════
const Freemium = (() => {
  const KEY_COUNT = 'superchef:searches';
  const KEY_DATE  = 'superchef:date';
  const KEY_PRO   = 'superchef:pro';

  function todayStr(){ return new Date().toISOString().slice(0,10); }

  function getCount(){
    const d = localStorage.getItem(KEY_DATE);
    if(d !== todayStr()){ localStorage.setItem(KEY_DATE, todayStr()); localStorage.setItem(KEY_COUNT,'0'); }
    return parseInt(localStorage.getItem(KEY_COUNT)||'0',10);
  }

  function isPro(){
    return localStorage.getItem(KEY_PRO) === '1';
  }

  function increment(){ localStorage.setItem(KEY_COUNT, String(getCount()+1)); }

  function remaining(){ return Math.max(0, FREE_SEARCHES_PER_DAY - getCount()); }

  return { isPro, getCount, increment, remaining };
})();

// ═══════════════════════════════════════════════
//  STORAGE — graceful fallback when not in Claude
// ═══════════════════════════════════════════════
const Storage = (() => {
  const HAS_NATIVE = typeof window !== 'undefined' && typeof window.storage !== 'undefined';
  let _mem = {};
  return {
    async get(key) {
      if (HAS_NATIVE) return window.storage.get(key);
      return _mem[key] != null ? { value: _mem[key] } : null;
    },
    async set(key, value) {
      if (HAS_NATIVE) return window.storage.set(key, value);
      _mem[key] = value; return { value };
    },
  };
})();

function getBg(n){const c0=n.charCodeAt(0)||0;const c3=n.length>3?(n.charCodeAt(3)||0):0;const h=(c0*23+c3*41)%360;return`linear-gradient(145deg,hsl(${h},30%,7%),hsl(${(h+50)%360},35%,12%))`;}

function renderBrowser(query){
  const scroll = document.getElementById('browserScroll');
  const q = query.trim().toLowerCase();

  if(q){
    const results = [];
    CATEGORIES.forEach(cat=>{
      cat.items.forEach(item=>{
        if(item.toLowerCase().includes(q)) results.push({item, cat: cat.name});
      });
    });
    if(results.length===0){
      scroll.innerHTML=`<div class="search-no-results">No ingredients found for "<b>${esc(q)}</b>".<br>Try a different term.</div>`;
      return;
    }
    const addedSet = new Set(ings.map(x=>x.toLowerCase()));
    const atLimit = ings.length >= MAX_INGREDIENTS;
    const pills = results.map(r=>{
      const isAdded = addedSet.has(r.item.toLowerCase());
      const cls = isAdded?'ipill added':(atLimit?'ipill disabled-pill':'ipill');
      return `<button class="${cls}" onclick="browserAdd(this,'${esc(r.item)}')" aria-label="Add ${esc(r.item)}" ${atLimit&&!isAdded?'disabled':''}>${esc(r.item)}</button>`;
    }).join('');
    scroll.innerHTML=`<div class="search-results-label">Results (${results.length})</div><div style="padding:8px 16px 14px;display:flex;flex-wrap:wrap;gap:7px;">${pills}</div>`;
    return;
  }

  const addedSet = new Set(ings.map(x=>x.toLowerCase()));
  const atLimit = ings.length >= MAX_INGREDIENTS;
  scroll.innerHTML = CATEGORIES.map((cat, ci)=>{
    const isOpen = openCats.has(ci);
    const addedCount = cat.items.filter(i=>addedSet.has(i.toLowerCase())).length;
    const pills = cat.items.map(item=>{
      const isAdded = addedSet.has(item.toLowerCase());
      const cls = isAdded?'ipill added':(atLimit?'ipill disabled-pill':'ipill');
      return `<button class="${cls}" onclick="browserAdd(this,'${esc(item)}')" aria-label="Add ${esc(item)}" ${atLimit&&!isAdded?'disabled':''}>${esc(item)}</button>`;
    }).join('');
    return `
    <div class="cat-block${isOpen?' open':''}" id="cat-${ci}">
      <div class="cat-header" onclick="toggleCat(${ci})" role="button" aria-expanded="${isOpen}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')toggleCat(${ci})">
        <div class="cat-emoji" aria-hidden="true">${cat.emoji}</div>
        <div class="cat-info">
          <div class="cat-name">${esc(cat.name)}</div>
          <div class="cat-sub">${addedCount>0?`${addedCount} added · `:''} ${cat.items.length} ingredients</div>
        </div>
        <div class="cat-arrow" aria-hidden="true">▼</div>
      </div>
      <div class="cat-pills">${pills}</div>
    </div>`;
  }).join('');
}

function toggleCat(ci){
  const el = document.getElementById(`cat-${ci}`);
  if(openCats.has(ci)){openCats.delete(ci);el.classList.remove('open');el.querySelector('.cat-header').setAttribute('aria-expanded','false');}
  else{openCats.add(ci);el.classList.add('open');el.querySelector('.cat-header').setAttribute('aria-expanded','true');}
}

function browserAdd(btn, item){
  if(ings.length>=MAX_INGREDIENTS) return;
  const c = toProperCase(item);
  if(ings.some(x=>x.toLowerCase()===c.toLowerCase())){
    removeIngByName(c); return;
  }
  ings.push(c);
  renderChips();
  document.getElementById('findBtn').disabled=false;
  updateLimitNote();
  saveIngredients();
  refreshBrowserPill(item, true);
  refreshBrowserSubtitles();
}

function removeIngByName(name){
  const idx = ings.findIndex(x=>x.toLowerCase()===name.toLowerCase());
  if(idx===-1)return;
  ings.splice(idx,1);
  renderChips();
  if(!ings.length) document.getElementById('findBtn').disabled=true;
  updateLimitNote();
  saveIngredients();
  refreshBrowserPill(name, false);
  refreshBrowserSubtitles();
}

function refreshBrowserPill(item, added){
  const atLimit = ings.length >= MAX_INGREDIENTS;
  document.querySelectorAll('.ipill').forEach(btn=>{
    const label = btn.getAttribute('aria-label')||'';
    const bItem = label.replace(/^Add /,'');
    if(bItem.toLowerCase()===item.toLowerCase()){
      if(added){btn.className='ipill added';btn.disabled=false;}
      else{btn.className=atLimit?'ipill disabled-pill':'ipill';btn.disabled=atLimit;}
    } else if(!added){
      if(btn.classList.contains('disabled-pill')&&!btn.classList.contains('added')){
        btn.className='ipill'; btn.disabled=false;
      }
    }
  });
  if(atLimit){
    document.querySelectorAll('.ipill:not(.added)').forEach(b=>{b.className='ipill disabled-pill';b.disabled=true;});
  }
}

function refreshBrowserSubtitles(){
  const addedSet = new Set(ings.map(x=>x.toLowerCase()));
  CATEGORIES.forEach((cat, ci)=>{
    const el = document.getElementById(`cat-${ci}`);
    if(!el) return;
    const sub = el.querySelector('.cat-sub');
    if(!sub) return;
    const addedCount = cat.items.filter(i=>addedSet.has(i.toLowerCase())).length;
    sub.textContent = `${addedCount>0?`${addedCount} added · `:''}${cat.items.length} ingredients`;
  });
}

function wordsMatch(a,b){
  const al=a.toLowerCase().trim(),bl=b.toLowerCase().trim();
  if(al===bl)return true;
  const re=new RegExp('\\b'+al.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b');
  if(re.test(bl))return true;
  const re2=new RegExp('\\b'+bl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b');
  return re2.test(al);
}

function reconcile(r){
  const matches=x=>ings.some(ing=>wordsMatch(ing,x));
  const used=(r.usedIngredients||[]).filter(matches);
  const missing=(r.missingIngredients||[]).filter(x=>!matches(x));
  const total=used.length+missing.length;
  const recalcScore=total>0?Math.round((used.length/total)*100):(r.matchScore||0);
  return{...r,usedIngredients:used,missingIngredients:missing,matchScore:Math.min(100,Math.max(0,recalcScore))};
                                                                                                                                                                        }// ═══════════════════════════

async function findRecipes(){
  if(!ings.length||isFetching)return;

  if(!Freemium.isPro()&&Freemium.remaining()===0){
    showUpgradeModal('daily');
    return;
  }

  isFetching=true;
  activeFilter='all';
  const findBtn=document.getElementById('findBtn');
  findBtn.disabled=true;
  const main=document.getElementById('main');

  main.innerHTML=`<div class="loading" role="status" aria-live="polite">
    <div class="load-ring" aria-hidden="true"><div class="load-emoji">🍳</div></div>
    <div class="load-text"><strong>Finding recipes…</strong><span>Checking what you can make with: ${esc(ings.join(', '))}</span></div>
  </div>`;

  const recipePrompt=`You are a world-class cooking AI. The user has these ingredients: ${ings.join(', ')}.
Pantry staples always available: salt, pepper, oil, water, sugar, flour, vinegar.

Return a JSON array of exactly 9 recipes the user can cook. Sort by matchScore descending.

Each item must have EXACTLY these fields:
{
  "name": "Recipe Name",
  "matchScore": 94,
  "cookTime": "20 min",
  "difficulty": "Easy",
  "servings": 2,
  "cuisine": "Italian",
  "cal": "320 kcal",
  "usedIngredients": ["egg","tomato"],
  "missingIngredients": ["basil"],
  "youtubeQuery": "easy tomato egg stir fry recipe"
}

difficulty must be exactly one of: Easy, Medium, or Hard
Return ONLY the raw JSON array. No markdown fences. No explanation.`;

  let recipes;
  try{
    const r1=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1400,messages:[{role:'user',content:recipePrompt}]})});
    if(r1.status===429||r1.status===529)throw new Error('Rate limit reached. Please wait a moment and try again.');
    if(!r1.ok)throw new Error(`API error ${r1.status}. Please try again.`);
    const d1=await r1.json();
    if(d1.error)throw new Error(d1.error.message);
    const raw1=d1.content.map(b=>b.text||'').join('');
    const parsed1=JSON.parse(raw1.replace(/```json|```/g,'').trim());
    if(!Array.isArray(parsed1)||parsed1.length===0)throw new Error('Unexpected response from AI. Please try again.');
    recipes=parsed1.map(reconcile);
    Freemium.increment();
    updateSearchCounter();
  }catch(err){
    main.innerHTML=`<div class="results-inner" role="alert"><div class="err"><div class="err-icon">⚠️</div><div class="err-msg"><strong>Something went wrong</strong><p>${esc(err.message||'Please try again.')}</p><button class="btn-retry" onclick="findRecipes()">Try Again</button></div></div></div>`;
    isFetching=false;findBtn.disabled=false;return;
  }

  renderRecipes(recipes,{pending:true});

  const videoPrompt=`For each recipe below, find a real YouTube video tutorial using web search.

Recipes:
${recipes.map((r,i)=>`${i+1}. ${r.name} — search: "${r.youtubeQuery}"`).join('\n')}

Return a JSON array with one object per recipe in the same order:
[{"index":0,"videoId":"REAL_ID_HERE","videoTitle":"Video title","channelName":"Channel","thumbnail":"https://img.youtube.com/vi/VIDEO_ID/hqdefault.jpg"}]

Rules:
- videoId must be a real 11-character YouTube video ID from an actual cooking tutorial
- If no real video found, return null for videoId and videoTitle
- Return ONLY raw JSON array. No markdown.`;

  try{
    const r2=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,tools:[{"type":"web_search_20250305","name":"web_search"}],messages:[{role:'user',content:videoPrompt}]})});
    if(!r2.ok)throw new Error(`Video search failed (${r2.status})`);
    const d2=await r2.json();
    if(d2.error)throw new Error(d2.error.message);
    const raw2=d2.content.map(b=>b.type==='text'?b.text:'').join('');
    const parsedVideos=JSON.parse(raw2.replace(/```json|```/g,'').trim());
    const videos=Array.isArray(parsedVideos)?parsedVideos:[];
    const merged=recipes.map((r,i)=>{
      const v=videos.find(x=>x.index===i)||videos[i]||{};
      const BLOCKED_IDS=new Set(['dQw4w9WgXcQ']);
      const validId=v.videoId&&/^[A-Za-z0-9_-]{11}$/.test(v.videoId)&&!BLOCKED_IDS.has(v.videoId)?v.videoId:null;
      return{...r,cardIndex:i,videoId:validId,videoTitle:validId?(v.videoTitle||null):null,channelName:validId?(v.channelName||null):null,thumbnail:validId?`https://img.youtube.com/vi/${validId}/hqdefault.jpg`:null,videoUrl:validId?`https://www.youtube.com/watch?v=${validId}`:`https://www.youtube.com/results?search_query=${encodeURIComponent(r.youtubeQuery||r.name)}`};
    });
    renderRecipes(merged,{filter:activeFilter});
  }catch(err){
    renderRecipes(recipes,{filter:activeFilter});
  }finally{
    isFetching=false;findBtn.disabled=false;
  }
}

function diffBadge(d){const l=(d||'').toLowerCase();if(l==='easy')return`<span class="badge b-easy">Easy</span>`;if(l==='hard')return`<span class="badge b-hard">Hard</span>`;return`<span class="badge b-medium">Medium</span>`;}

      :`<span style="position:relative;z-index:1;filter:drop-shadow(0 2px 10px rgba(0,0,0,0.7))">${emoji}</span>`;
    const channelLine=r.channelName?`<div class="cmeta-i" style="color:var(--lime);font-size:0.68rem">📺 ${esc(r.channelName)}</div>`:'';
    const directBadge=hasRealVideo?`<span style="position:absolute;top:10px;right:10px;background:#ff0000;color:#fff;font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase">Video</span>`:`<span style="position:absolute;top:10px;right:10px;background:#333;color:#888;font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase">Search</span>`;

        <div class="cmeta"><div class="cmeta-i">⏱ ${esc(r.cookTime||'—')}</div><div class="cmeta-i">👤 ${esc(servingsDisplay)}</div>${r.cuisine?`<div class="cmeta-i">🌍 ${esc(r.cuisine)}</div>`:''} ${r.cal?`<div class="cmeta-i">🔥 ${esc(r.cal)}</div>`:''}</div>
        ${channelLine}
        <div class="mbar-row"><div class="mbar-bg"><div class="mbar-fg" style="width:${pct}%"></div></div><div class="mbar-pct">${pct}%</div></div>
        <div class="ing-pills">${have}${need}</div>
        <a class="btn-watch" href="${esc(ytUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><div class="yt-logo">▶</div> ${hasRealVideo?'Watch Video':'Search YouTube'}</a>
      </div>
    </div>`;
  }).join('');
  const pendingHtml=opts.pending?`<div class="video-pending"><span class="dot"></span>Searching YouTube for tutorials…</div>`:'';
  main.innerHTML=`<div class="results-inner">
    <div class="res-header">
      <div><div class="res-title">Found <span class="hl">${total} Dishes</span><br>You Can Cook</div><div class="res-sub">Using: <b>${esc(ings.join(', '))}</b></div>${pendingHtml}</div>
      <div class="filter-row" role="group"><button class="f-btn" data-f="all" onclick="filterBy(this,'all')">All</button><button class="f-btn" data-f="easy" onclick="filterBy(this,'easy')">Easy</button><button class="f-btn" data-f="full" onclick="filterBy(this,'full')">Full Match</button></div>
    </div>
    ${statsHtml}
    <div class="recipe-grid" id="grid" role="list">${cards}</div>
  </div>`;
  const ft=opts.filter||'all';
  const fb=main.querySelector(`.f-btn[data-f="${ft}"]`)||main.querySelector('.f-btn[data-f="all"]');
  if(fb)filterBy(fb,ft);

  if(!Freemium.isPro()&&!opts.pending){
    const adEl=document.createElement('div');
    adEl.className='ad-banner';
    adEl.innerHTML=`
      <div class="ad-label">Advertisement</div>
      <div class="ad-placeholder">
        <div class="ad-mock">
          <span>🚀 Ad-free experience with <strong>SuperChef Pro</strong></span>
          <button class="btn-go-pro-small" onclick="showUpgradeModal('ad')">Go Pro ${PRO_PRICE}</button>
        </div>
      </div>`;
    main.querySelector('.results-inner').appendChild(adEl);
  }
        }function filterBy(btn,type){
  activeFilter=type;
  document.querySelectorAll('.f-btn').forEach(b=>{b.classList.remove('on');b.setAttribute('aria-pressed','false');});
  btn.classList.add('on');btn.setAttribute('aria-pressed','true');
  const grid=document.getElementById('grid');
  let visible=0;
  document.querySelectorAll('.rcard').forEach(c=>{
    const diff=c.dataset.diff,pct=parseInt(c.dataset.pct||'0',10);
    let show=type==='all'||(type==='easy'&&diff==='easy')||(type==='full'&&pct>=90);
    c.style.display=show?'':'none';
    if(show)visible++;
  });
  const ex=grid.querySelector('.filter-empty');if(ex)ex.remove();
  if(visible===0){
    const d=document.createElement('div');d.className='filter-empty';
    const lbls={'easy':'Easy','full':'Full Match'};
    d.innerHTML=`<div class="filter-empty-icon">🔍</div><div class="filter-empty-msg"><strong>No ${lbls[type]||''} recipes found</strong>Try a different filter or add more ingredients.</div>`;
    grid.appendChild(d);
  }
}
</script>
</body>
</html>
